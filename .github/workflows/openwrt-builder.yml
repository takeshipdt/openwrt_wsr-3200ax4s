name: OpenWrt GitHub Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    # OpenWrt公式のビルド用コンテナを使用（環境エラーを完全回避）
    container:
      image: ghcr.io/openwrt/buildbot/buildworker-v25.12.5:latest

    steps:
    - name: Checkout Your Repository
      uses: actions/checkout@v4

    # コンテナ環境でも、ccacheフォルダ（~/.ccache）をしっかり記憶・復元します
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ubuntu-22.04-openwrt-ccache-${{ github.sha }}
        restore-keys: |
          ubuntu-22.04-openwrt-ccache-

    - name: Run Builder Script
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Upload Firmware to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: openwrt-wsr3200ax4s-${{ github.sha }}
        files: openwrt/bin/targets/mediatek/mt7622/*
